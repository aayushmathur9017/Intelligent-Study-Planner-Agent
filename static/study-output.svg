<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title subtitle">
  <title id="title">Study Plan Visual</title>
  <desc id="subtitle">A study planner illustration with progress bars and calendar icons.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  <rect x="70" y="70" width="1060" height="660" rx="40" fill="url(#panel)" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="6" />
  <rect x="120" y="140" width="420" height="140" rx="24" fill="#111827" stroke="#334155" stroke-width="2" />
  <rect x="120" y="320" width="420" height="120" rx="24" fill="#111827" stroke="#334155" stroke-width="2" />
  <rect x="120" y="480" width="420" height="120" rx="24" fill="#111827" stroke="#334155" stroke-width="2" />
  <rect x="620" y="140" width="420" height="120" rx="24" fill="#111827" stroke="#334155" stroke-width="2" />
  <rect x="620" y="300" width="420" height="200" rx="24" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="150" y="190" fill="#38bdf8" font-family="Segoe UI, sans-serif" font-size="34" font-weight="700">Weekly Focus</text>
  <text x="150" y="360" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="28">Day 1: Core concepts</text>
  <text x="150" y="520" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="28">Day 3: Practice problems</text>
  <rect x="150" y="200" width="340" height="20" rx="10" fill="#0f172a" />
  <rect x="150" y="200" width="260" height="20" rx="10" fill="#38bdf8" />
  <rect x="150" y="380" width="340" height="20" rx="10" fill="#0f172a" />
  <rect x="150" y="380" width="180" height="20" rx="10" fill="#60a5fa" />
  <rect x="150" y="540" width="340" height="20" rx="10" fill="#0f172a" />
  <rect x="150" y="540" width="240" height="20" rx="10" fill="#38bdf8" />
  <text x="650" y="180" fill="#38bdf8" font-family="Segoe UI, sans-serif" font-size="34" font-weight="700">Progress</text>
  <circle cx="780" cy="410" r="60" fill="#0f172a" stroke="#38bdf8" stroke-width="4" />
  <path d="M760 410 l20 20 l40 -40" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" />
  <path d="M810 410 l-20 20 l-40 -40" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" />
  <text x="650" y="470" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="24">Study goals met</text>
  <path d="M680 340 h200" stroke="#94a3b8" stroke-width="20" stroke-linecap="round" />
  <path d="M680 340 h140" stroke="#38bdf8" stroke-width="20" stroke-linecap="round" />
  <text x="650" y="360" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="20">Daily progress</text>
  <text x="650" y="650" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="32" font-weight="700">Intelligent Study Planner</text>
</svg>
